<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eid Lucky Draw - Bangladesh Armed Forces</title>
    <link rel="stylesheet" href="index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-overlay"></div>

    <div class="container">
      <!-- Header Section -->
      <header class="header">
        <div class="emblem-container">
          <div class="star left-star">★</div>
          <h1 class="title">LOTTERY</h1>
          <div class="star right-star">★</div>
        </div>
      </header>

      <!-- Number Display Section -->
      <div class="number-display-container">
        <div class="display-frame">
          <div class="digit-container">
            <div class="digit" id="digit-1">
              <span class="digit-value">-</span>
            </div>
            <div class="digit" id="digit-2">
              <span class="digit-value">-</span>
            </div>
            <div class="digit" id="digit-3">
              <span class="digit-value">-</span>
            </div>
            <div class="digit" id="digit-4">
              <span class="digit-value">-</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Button Section -->
      <div class="button-container">
        <button id="draw-btn" class="btn draw-btn">
          <span class="btn-text">DRAW</span>
        </button>
        <button id="reset-btn" class="btn reset-btn hidden">
          <span class="btn-text">RESET</span>
        </button>
      </div>

      <!-- Footer -->
      <footer class="footer">
      </footer>
    </div>

    <script src="index.js"></script>
  </body>
</html>
